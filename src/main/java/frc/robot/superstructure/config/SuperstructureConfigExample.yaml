# Example Superstructure Configuration
# This demonstrates how to define a complete superstructure system using YAML

subsystems:
  elevator:
    type: "elevator"
    parameter_name: "height"
    default_value: 0.0
    min_value: 0.0
    max_value: 2.0
    tunable_prefix: "Elevator"
  
  intake:
    type: "pivot"
    parameter_name: "angle"
    default_value: 0.0
    min_value: -45.0
    max_value: 180.0
    tunable_prefix: "Intake"
  
  endEffectorArm:
    type: "pivot"
    parameter_name: "angle"
    default_value: 90.0
    min_value: -90.0
    max_value: 180.0
    tunable_prefix: "EndEffectorArm"
  
  intakeRoller:
    type: "roller"
    parameter_name: "voltage"
    default_value: 0.0
    min_value: -12.0
    max_value: 12.0
    tunable_prefix: "IntakeRoller"

poses:
  idle_pose:
    description: "Robot idle/stow position"
    positions:
      elevator: 0.1
      intake: 10.0
      endEffectorArm: 90.0
  
  coral_ground_intake_pose:
    description: "Position to pick up coral from ground"
    positions:
      elevator: 0.0
      intake: 180.0
      endEffectorArm: -45.0
  
  coral_stow_pose:
    description: "Safe stow position while holding coral"
    positions:
      elevator: 0.2
      intake: 45.0
      endEffectorArm: 120.0
  
  l3_score_pose:
    description: "L3 scoring position"
    positions:
      elevator: 1.5
      intake: 45.0
      endEffectorArm: 90.0
  
  avoid_pose:
    description: "Safe position to avoid collisions"
    positions:
      elevator: 0.8
      intake: 45.0
      endEffectorArm: 90.0

states:
  START:
    pose: "idle_pose"
    description: "Initial startup state"
  
  IDLE:
    pose: "idle_pose"
    description: "Default idle state"
  
  CORAL_GROUND_INTAKE:
    pose: "coral_ground_intake_pose"
    description: "Picking up coral from ground"
    voltages:
      intakeRoller: 8.0
    gamepiece_effects:
      gives: ["hasCoral"]
  
  CORAL_STOW:
    pose: "coral_stow_pose"
    description: "Holding coral in safe position"
    gamepiece_effects:
      requires: ["hasCoral"]
  
  L3:
    pose: "l3_score_pose"
    description: "Ready to score at L3"
    gamepiece_effects:
      requires: ["hasCoral"]
  
  L3_EJECT:
    pose: "l3_score_pose"
    description: "Ejecting coral at L3"
    voltages:
      intakeRoller: -12.0
    gamepiece_effects:
      requires: ["hasCoral"]
      removes: ["hasCoral"]
  
  AVOID:
    pose: "avoid_pose"
    description: "Safe collision avoidance position"

transitions:
  # Basic startup transition
  - from: "START"
    to: "IDLE"
    edge_type: "standard"
  
  # Standard transitions between safe states
  - from: "IDLE"
    to: "CORAL_GROUND_INTAKE"
    bidirectional: true
    edge_type: "standard"
  
  - from: "CORAL_GROUND_INTAKE"
    to: "CORAL_STOW"
    bidirectional: true
    edge_type: "standard"
  
  - from: "CORAL_STOW"
    to: "L3"
    bidirectional: true
    edge_type: "elevator_first"  # Move elevator first for safety
  
  # Shooting transitions (restricted - only used when directly targeting eject state)
  - from: "L3"
    to: "L3_EJECT"
    restricted: true
    edge_type: "standard"
  
  # Emergency avoidance transitions
  - from: "IDLE"
    to: "AVOID"
    bidirectional: true
    edge_type: "elevator_first"
  
  - from: "CORAL_STOW"
    to: "AVOID"
    bidirectional: true
    edge_type: "standard"
  
  - from: "L3"
    to: "AVOID"
    bidirectional: true
    edge_type: "standard"

default_command:
  logic_type: "conditional"
  conditions:
    - condition: "hasCoral"
      state: "CORAL_STOW"
      priority: 1
    
    - condition: "inDangerZone"
      state: "AVOID"
      priority: 2
    
    - condition: "indexRollerHasCoral"
      state: "CORAL_GROUND_INTAKE"
      priority: 3
  
  fallback_state: "IDLE"

safety:
  safe_flip_height: 0.5
  danger_zones:
    - "isInHexagonalReefDangerZone"
  
  collision_groups:
    - name: "states_below_no_flip"
      states: ["CORAL_GROUND_INTAKE", "IDLE"]
      transition_type: "standard"
    
    - name: "states_above_flip"
      states: ["CORAL_STOW", "L3"]
      transition_type: "elevator_first" 